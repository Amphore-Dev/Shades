name: ☢️ Publish Production Package

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  install:
    name: 📦 Install Dependencies
    uses: ./.github/workflows/install.yml
    with:
      node-version: "20.x"

  ci:
    name: 🧪 Run Tests
    needs: install
    uses: ./.github/workflows/ci.yml
    with:
      node-version: "20.x"

  publish:
    name: 📤 Publish to NPM
    needs: [install, ci]
    uses: ./.github/workflows/publish.yml
    with:
      node-version: "20.x"
    secrets: inherit

  deploy-github-pages:
    name: 🚀 Deploy Example to GitHub Pages
    needs: [install, ci]
    uses: ./.github/workflows/deploy-pages.yml
    with:
      node-version: "20.x"
