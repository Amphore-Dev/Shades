name: "🚀 Deploy to GitHub Pages"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        default: "20.x"
        type: string
    outputs:
      page_url:
        description: "URL where the page was deployed"
        value: ${{ jobs.deploy-pages.outputs.page_url }}

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: "🚀 Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-action.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy-action.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages Action
        id: deploy-action
        uses: ./.github/actions/deploy-pages
        with:
          node-version: ${{ inputs.node-version }}
